<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文字呼吸 · 第一页</title>
<style>
  :root{--bg:#faf8f5;--text:#3d3228;--accent:#c4754b;--muted:#b8a898}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Cormorant Garamond","Noto Serif SC","Georgia",serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;cursor:default;user-select:none}
  .scene{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  .letter{font-size:min(40vw,50vh);font-weight:300;line-height:1;transition:font-weight 0.4s ease,letter-spacing 0.4s ease,transform 0.3s ease;will-change:transform,font-weight,letter-spacing}
  .meta{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);text-align:center}
  .meta .title{font-size:1.3rem;letter-spacing:0.08em;color:var(--text)}
  .meta .hint{font-size:0.8rem;color:var(--muted);margin-top:6px;letter-spacing:0.06em}
  .back{position:fixed;top:28px;left:32px;z-index:10;font-size:0.9rem;color:var(--muted);text-decoration:none;transition:color 0.3s;letter-spacing:0.05em}
  .back:hover{color:var(--accent)}
  .cam-dot{position:fixed;top:28px;right:32px;z-index:10;display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--muted)}
  .cam-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:#ccc;transition:background 0.5s}
  .cam-dot.live::before{background:#8cc9a0;box-shadow:0 0 6px rgba(140,201,160,0.5)}
</style>
</head>
<body>
<a href="../index.html" class="back">← 目录</a>
<div class="cam-dot" id="cam">待命</div>
<div class="scene"><span class="letter" id="letter">1</span></div>
<div class="meta"><div class="title">文字呼吸</div><div class="hint">靠近文字 · 挥手改变字重</div></div>

<script>
(() => {
  const letter = document.getElementById('letter');
  const camEl = document.getElementById('cam');
  let mx = -500, my = -500, mot = 0;

  // ── 鼠标靠近文字 → 字重变轻、字距变宽、微微放大 ──
  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    const rect = letter.getBoundingClientRect();
    const cx = rect.left + rect.width/2, cy = rect.top + rect.height/2;
    const dx = mx - cx, dy = my - cy;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const maxDist = 400;
    const t = Math.max(0, 1 - dist/maxDist);

    // Near → lighter, wider tracking, slightly larger
    const weight = 100 + t * 600;              // 100–700
    const spacing = t * 0.25;                   // 0–0.25em
    const scale = 1 + t * 0.15;                 // 1–1.15
    const skewX = (dx / window.innerWidth) * 3; // slight skew with position

    letter.style.fontWeight = weight;
    letter.style.letterSpacing = spacing + 'em';
    letter.style.transform = `scale(${scale}) skewX(${skewX}deg)`;
  });

  // ── 摄像头动作 → 字重额外波动 ──
  let camOk = false;
  async function initCam() { if (window.self !== window.top) { console.log("在iframe中，跳过摄像头初始化"); return; }
    try {
      const s = await navigator.mediaDevices.getUserMedia({video:{width:160,height:120,facingMode:'user'}});
      const v = document.createElement('video'); v.srcObject = s; v.play();
      camOk = true; camEl.classList.add('live'); camEl.textContent = '就绪';
      const oc = document.createElement('canvas'); oc.width=160; oc.height=120;
      const octx = oc.getContext('2d',{willReadFrequently:true});
      let pf = null;
      (function det(){
        if(!camOk)return;
        if(v.readyState<2){requestAnimationFrame(det);return}
        octx.drawImage(v,0,0,160,120);
        const f=octx.getImageData(0,0,160,120);
        if(pf){let d=0;for(let i=0;i<f.data.length;i+=16)d+=Math.abs(f.data[i]-pf.data[i]);mot += (Math.min(d/400000,1)-mot)*0.3}
        pf=f;
        // Apply motion wobble to existing weight
        const curW = parseInt(letter.style.fontWeight) || 300;
        letter.style.fontWeight = curW + Math.sin(Date.now()*0.01)*mot*200;
        letter.style.transform = letter.style.transform.replace(/scale\([^)]+\)/, `scale(${1+mot*0.2})`);
        requestAnimationFrame(det);
      })();
    } catch(e) { camEl.textContent = '未授权'; }
  }
  initCam();
})();
</script>
</body>
</html>
