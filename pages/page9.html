<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>音流 · 第九页</title>
<style>
  :root{--bg:#faf8f6;--text:#4a3830;--accent:#c4785a;--muted:#b89880}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Cormorant Garamond","Noto Serif SC","Georgia",serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;user-select:none}
  canvas{position:fixed;top:0;left:0;z-index:0}
  .overlay{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .info{text-align:center}
  .info .num{font-size:5rem;font-weight:300;color:var(--accent);line-height:1;opacity:0.8}
  .info .title{font-size:1.2rem;letter-spacing:0.08em}
  .info .hint{font-size:0.75rem;color:var(--muted);letter-spacing:0.06em}
  .back{position:fixed;top:28px;left:32px;z-index:10;font-size:0.9rem;color:var(--muted);text-decoration:none;transition:color 0.3s;letter-spacing:0.05em}
  .back:hover{color:var(--accent)}
  .cam-dot{position:fixed;top:28px;right:32px;z-index:10;display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--muted)}
  .cam-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:#ccc;transition:background 0.5s}
  .cam-dot.live::before{background:#8cc9a0}
</style>
</head>
<body>
<a href="../index.html" class="back">← 目录</a>
<div class="cam-dot" id="cam">待命</div>
<canvas id="c"></canvas>
<div class="overlay"><div class="info"><div class="num">9</div><div class="title">音流</div><div class="hint">鼠标控制频率 · 挥手改变波形</div></div></div>

<script>
(() => {
  const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
  let W, H;
  function rs(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
  rs(); addEventListener('resize', rs);

  let mx = W/2, my = H/2, mot = 0;
  const bars = 80;

  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });

  // Camera
  let camOk = false;
  async function initCam() { if (window.self !== window.top) { console.log("在iframe中，跳过摄像头初始化"); return; }
    try {
      const s = await navigator.mediaDevices.getUserMedia({video:{width:160,height:120,facingMode:'user'}});
      const v = document.createElement('video'); v.srcObject = s; v.play();
      camOk = true; document.getElementById('cam').classList.add('live'); document.getElementById('cam').textContent = '就绪';
      const oc = document.createElement('canvas'); oc.width=160; oc.height=120;
      const octx = oc.getContext('2d',{willReadFrequently:true}); let pf = null;
      (function det(){
        if(!camOk)return;
        if(v.readyState<2){requestAnimationFrame(det);return}
        octx.drawImage(v,0,0,160,120);
        const f=octx.getImageData(0,0,160,120);
        if(pf){let d=0;for(let i=0;i<f.data.length;i+=16)d+=Math.abs(f.data[i]-pf.data[i]);mot=Math.min(d/400000,1)}
        pf=f; requestAnimationFrame(det);
      })();
    } catch(e) { document.getElementById('cam').textContent = '未授权'; }
  }
  initCam();

  const barHeights = new Float32Array(bars);
  const barTargets = new Float32Array(bars);
  const barColors = new Array(bars);

  for (let i = 0; i < bars; i++) {
    barHeights[i] = 0;
    barColors[i] = ['#c4785a','#d4956b','#e0a880','#e8b898','#d8a078'][Math.floor(Math.random()*5)];
  }

  function anim() {
    ctx.clearRect(0, 0, W, H);

    // Warm gradient background
    const grad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H));
    grad.addColorStop(0, '#faf8f6'); grad.addColorStop(1, '#f2ece4');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);

    const barW = W / bars;
    const centerX = mx / W; // 0-1 horizontal influence
    const centerY = my / H; // 0-1 vertical influence

    // Also draw a flowing sine wave
    ctx.beginPath();
    ctx.moveTo(0, H/2);
    for (let x = 0; x < W; x++) {
      const freq = 0.005 + centerX * 0.03;
      const amp = 40 + centerY * 120 + mot * 80;
      const y = H/2 + Math.sin(x*freq + Date.now()*0.003) * amp * 0.5
                + Math.sin(x*freq*3 + Date.now()*0.005) * amp * 0.2;
      ctx.lineTo(x, y);
    }
    ctx.strokeStyle = 'rgba(196,120,90,0.2)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Frequency bars
    for (let i = 0; i < bars; i++) {
      // Mouse proximity affects this bar's "frequency"
      const barCX = (i+0.5)*barW;
      const distFromMouse = Math.abs(barCX - mx) / W;
      const mouseInfluence = Math.max(0, 1 - distFromMouse * 3);

      // Simulated frequency response — bars near mouse are louder
      const baseAmp = 0.1 + mouseInfluence * 0.7 + mot * 0.3;
      const time = Date.now() * 0.002;
      const freqMod = Math.sin(i * 0.3 + time) * Math.cos(i * 0.17 + time * 1.3);
      barTargets[i] = (baseAmp * 0.6 + Math.abs(freqMod) * 0.4) * H * 0.6;

      // Smooth
      barHeights[i] += (barTargets[i] - barHeights[i]) * 0.08;

      // Draw bar
      const h = barHeights[i];
      ctx.fillStyle = barColors[i];
      ctx.globalAlpha = 0.5 + mouseInfluence * 0.4;
      ctx.fillRect(i*barW + 1, H - h, barW - 2, h);

      // Top highlight
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(i*barW + 1, H - h, barW - 2, 3);
    }
    ctx.globalAlpha = 1;

    requestAnimationFrame(anim);
  }
  anim();
})();
</script>
</body>
</html>
