<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光与影 · 第七页</title>
<style>
  :root{--bg:#faf9f6;--text:#4a4030;--accent:#d4a040;--muted:#b0a080}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:"Cormorant Garamond","Noto Serif SC","Georgia",serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;user-select:none}
  canvas{position:fixed;top:0;left:0;z-index:0}
  .overlay{position:fixed;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .info{text-align:center}
  .info .num{font-size:6rem;font-weight:300;color:var(--accent);line-height:1;opacity:0.6}
  .info .title{font-size:1.2rem;letter-spacing:0.08em}
  .info .hint{font-size:0.75rem;color:var(--muted);letter-spacing:0.06em}
  .back{position:fixed;top:28px;left:32px;z-index:10;font-size:0.9rem;color:var(--muted);text-decoration:none;transition:color 0.3s;letter-spacing:0.05em}
  .back:hover{color:var(--accent)}
  .cam-dot{position:fixed;top:28px;right:32px;z-index:10;display:flex;align-items:center;gap:6px;font-size:0.75rem;color:var(--muted)}
  .cam-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:#ccc;transition:background 0.5s}
  .cam-dot.live::before{background:#e8c060}
</style>
</head>
<body>
<a href="../index.html" class="back">← 目录</a>
<div class="cam-dot" id="cam">待命</div>
<canvas id="c"></canvas>
<div class="overlay"><div class="info"><div class="num">7</div><div class="title">光与影</div><div class="hint">光源随鼠标 · 挥手改变亮度</div></div></div>

<script>
(() => {
  const canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
  let W, H;
  function rs(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
  rs(); addEventListener('resize', rs);

  let lx = W/2, ly = H/2, mot = 0; // light position
  document.addEventListener('mousemove', e => { lx = e.clientX; ly = e.clientY; });

  // Objects in the scene
  const objects = [];
  const N_OBJ = 12;
  for (let i = 0; i < N_OBJ; i++) {
    objects.push({
      x: W * (0.1 + Math.random()*0.8),
      y: H * (0.1 + Math.random()*0.8),
      r: 20 + Math.random() * 50,
      elevation: 10 + Math.random() * 60, // how "tall" — casts longer shadow
      shape: Math.floor(Math.random()*3), // 0=circle, 1=square, 2=triangle
    });
  }

  // Camera → light intensity
  let camOk = false;
  async function initCam() { if (window.self !== window.top) { console.log("在iframe中，跳过摄像头初始化"); return; }
    try {
      const s = await navigator.mediaDevices.getUserMedia({video:{width:160,height:120,facingMode:'user'}});
      const v = document.createElement('video'); v.srcObject = s; v.play();
      camOk = true; document.getElementById('cam').classList.add('live'); document.getElementById('cam').textContent = '就绪';
      const oc = document.createElement('canvas'); oc.width=160; oc.height=120;
      const octx = oc.getContext('2d',{willReadFrequently:true}); let pf = null;
      (function det(){
        if(!camOk)return;
        if(v.readyState<2){requestAnimationFrame(det);return}
        octx.drawImage(v,0,0,160,120);
        const f=octx.getImageData(0,0,160,120);
        if(pf){let d=0;for(let i=0;i<f.data.length;i+=16)d+=Math.abs(f.data[i]-pf.data[i]);mot=Math.min(d/400000,1)}
        pf=f; requestAnimationFrame(det);
      })();
    } catch(e) { document.getElementById('cam').textContent = '未授权'; }
  }
  initCam();

  function anim() {
    ctx.clearRect(0, 0, W, H);

    // Ambient warm surface
    const ambGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H));
    ambGrad.addColorStop(0, '#fcfaf5');
    ambGrad.addColorStop(1, '#f0ece0');
    ctx.fillStyle = ambGrad;
    ctx.fillRect(0, 0, W, H);

    const intensity = 0.6 + mot * 0.4;

    // Draw shadows first (cast away from light)
    objects.forEach(obj => {
      const dx = obj.x - lx, dy = obj.y - ly;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;
      const shadowLen = obj.elevation * 1.5 * intensity;
      const sx = obj.x + (dx/dist) * shadowLen;
      const sy = obj.y + (dy/dist) * shadowLen;

      ctx.save();
      ctx.globalAlpha = 0.12 * intensity;
      ctx.fillStyle = '#706050';

      if (obj.shape === 0) {
        // Elliptical shadow stretched away from light
        const angle = Math.atan2(dy, dx);
        ctx.translate((obj.x+sx)/2, (obj.y+sy)/2);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.ellipse(0, 0, obj.r + shadowLen*0.5, obj.r*0.6, 0, 0, Math.PI*2);
        ctx.fill();
      } else if (obj.shape === 1) {
        ctx.beginPath();
        ctx.moveTo(obj.x, obj.y);
        ctx.lineTo(sx - obj.r*0.7, sy - obj.r*0.7);
        ctx.lineTo(sx + obj.r*0.7, sy - obj.r*0.7);
        ctx.lineTo(obj.x + obj.r*1.4, obj.y);
        ctx.closePath();
        ctx.fill();
      } else {
        ctx.beginPath();
        ctx.moveTo(obj.x, obj.y - obj.r);
        ctx.lineTo(obj.x + obj.r, obj.y + obj.r);
        ctx.lineTo(sx, sy + obj.r*0.5);
        ctx.lineTo(obj.x - obj.r, obj.y + obj.r);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    });

    // Draw objects with lighting
    objects.forEach(obj => {
      const dx = obj.x - lx, dy = obj.y - ly;
      const dist = Math.sqrt(dx*dx+dy*dy) || 1;

      // Light hit factor — brighter when closer to light
      const lightFactor = Math.max(0.1, 1 - dist / Math.max(W,H)) * intensity;

      ctx.save();
      if (obj.shape === 0) {
        const grad = ctx.createRadialGradient(
          obj.x - (dx/dist)*obj.r*0.3,
          obj.y - (dy/dist)*obj.r*0.3,
          obj.r*0.1,
          obj.x, obj.y, obj.r
        );
        grad.addColorStop(0, `rgba(255,248,235,${0.8*lightFactor})`);
        grad.addColorStop(0.6, `rgba(200,170,130,${0.7})`);
        grad.addColorStop(1, `rgba(160,130,90,${0.5})`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(obj.x, obj.y, obj.r, 0, Math.PI*2);
        ctx.fill();
      } else if (obj.shape === 1) {
        const grad = ctx.createLinearGradient(
          obj.x - (dx/dist)*obj.r,
          obj.y - (dy/dist)*obj.r,
          obj.x + (dx/dist)*obj.r,
          obj.y + (dy/dist)*obj.r
        );
        grad.addColorStop(0, `rgba(255,245,230,${0.7*lightFactor})`);
        grad.addColorStop(1, `rgba(180,150,110,${0.6})`);
        ctx.fillStyle = grad;
        ctx.fillRect(obj.x-obj.r, obj.y-obj.r, obj.r*2, obj.r*2);
      } else {
        const grad = ctx.createLinearGradient(
          obj.x - (dx/dist)*obj.r,
          obj.y - (dy/dist)*obj.r,
          obj.x + (dx/dist)*obj.r,
          obj.y + (dy/dist)*obj.r
        );
        grad.addColorStop(0, `rgba(255,245,230,${0.7*lightFactor})`);
        grad.addColorStop(1, `rgba(180,150,110,${0.6})`);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(obj.x, obj.y-obj.r);
        ctx.lineTo(obj.x+obj.r*0.87, obj.y+obj.r*0.5);
        ctx.lineTo(obj.x-obj.r*0.87, obj.y+obj.r*0.5);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    });

    // Light source glow
    const glowGrad = ctx.createRadialGradient(lx, ly, 0, lx, ly, 80 + mot*60);
    glowGrad.addColorStop(0, `rgba(255,248,200,${0.25*intensity})`);
    glowGrad.addColorStop(1, 'rgba(255,248,200,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath(); ctx.arc(lx, ly, 80+mot*60, 0, Math.PI*2); ctx.fill();

    requestAnimationFrame(anim);
  }
  anim();
})();
</script>
</body>
</html>
